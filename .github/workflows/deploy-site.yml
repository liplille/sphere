# ============================================================
# Déploiement du site sur n0c (PlanetHoster) via FTP.
# Déclenché à chaque push sur main qui touche le frontend.
#
# Secrets à créer dans GitHub (Settings → Secrets and variables → Actions) :
#   FTP_SERVER   — ex. node12-xx.n0c.com (ou ftp.yesin.media)
#   FTP_USERNAME — compte FTP (racine = home n0c ; web root = ./public_html/)
#   FTP_PASSWORD
# ============================================================
name: Deploy site (n0c)

on:
  push:
    branches: [main]
    paths-ignore:
      - "supabase/**"
      - "README.md"

env:
  # Les actions tierces tournent encore sur Node 20 (déprécié, retiré sept. 2026) ;
  # force Node 24 dès maintenant pour supprimer le warning et anticiper la bascule.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Build (Vite)
        run: npm run build

      - name: Deploy FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftps
          local-dir: ./dist/
          # Web root n0c de yesin.media (le lien "www" pointe dessus).
          server-dir: ./public_html/
